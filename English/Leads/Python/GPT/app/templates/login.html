{% extends "base.html" %}

{% block content %}
<section class="auth-card">
    <div class="section-copy">
        <span class="eyebrow">Secure Access</span>
        <h2>Welcome back to your lead command center</h2>
        <p>Sign in to manage pipeline health, review capture trends, and keep every client queue moving.</p>
    </div>
    <form id="loginForm" class="panel form-grid">
        <label>
            <span>Email</span>
            <input type="email" name="email" placeholder="manager@company.com" required>
        </label>
        <label>
            <span>Password</span>
            <input type="password" name="password" placeholder="Enter your password" required>
        </label>
        <button class="primary-button" type="submit">Login</button>
        <p class="form-message" id="loginMessage"></p>
        <p class="aux-link">Need an account? <a href="/register">Create one</a></p>
    </form>
</section>
{% endblock %}

{% block scripts %}
<script src="/static/js/login.js"></script>
{% endblock %}
