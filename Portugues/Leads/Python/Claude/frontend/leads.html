<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Manager — Leads</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand"><h1>Lead<span>Manager</span></h1></div>
    <div class="sidebar-user">
      <div class="user-name" id="user-name">Carregando…</div>
      <div class="user-email" id="user-email"></div>
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="/leads" class="active">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Leads
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" id="logout-btn">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </a>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Leads</div>
      <div class="topbar-actions">
        <!-- Import/Export -->
        <input type="file" id="import-input" accept=".csv,.xlsx,.xls" class="hidden">
        <button class="btn btn-secondary" id="btn-import" title="Importar CSV ou Excel">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Importar
        </button>
        <button class="btn btn-secondary" id="btn-export-csv" title="Exportar CSV">CSV</button>
        <button class="btn btn-secondary" id="btn-export-excel" title="Exportar Excel">Excel</button>
        <button class="btn btn-primary" id="btn-new-lead">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Novo Lead
        </button>
      </div>
    </div>

    <div class="page-content">
      <!-- Filters -->
      <div class="filters-bar">
        <input id="search-q" type="text" class="form-control filter-search" placeholder="Buscar por nome, e-mail ou empresa…">
        <select id="filter-status" class="form-control">
          <option value="">Todos os status</option>
          <option value="novo">Novo</option>
          <option value="em_contato">Em Contato</option>
          <option value="qualificado">Qualificado</option>
          <option value="perdido">Perdido</option>
        </select>
        <select id="filter-fonte" class="form-control">
          <option value="">Todas as fontes</option>
          <option value="indicacao">Indicação</option>
          <option value="site">Site</option>
          <option value="evento">Evento</option>
          <option value="redes_sociais">Redes Sociais</option>
          <option value="email_marketing">E-mail Marketing</option>
          <option value="outros">Outros</option>
        </select>
        <input id="filter-data-inicio" type="date" class="form-control" title="Data de captura — início">
        <input id="filter-data-fim" type="date" class="form-control" title="Data de captura — fim">
        <button class="btn btn-primary" id="btn-search">Filtrar</button>
        <button class="btn btn-secondary" id="btn-clear-filters">Limpar</button>
      </div>

      <!-- Table -->
      <div class="card" style="padding:0;overflow:hidden">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Nome / E-mail</th>
              <th>Empresa</th>
              <th>Cargo</th>
              <th>Fonte</th>
              <th>Status</th>
              <th>Captura</th>
              <th style="width:90px">Ações</th>
            </tr></thead>
            <tbody id="leads-tbody">
              <tr><td colspan="7"><div class="empty-state"><p>Carregando…</p></div></td></tr>
            </tbody>
          </table>
        </div>
        <div style="padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #f3f4f6">
          <span class="text-muted" style="font-size:12px" id="page-info"></span>
          <div id="pagination" class="pagination" style="padding:0"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Novo Lead -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Novo Lead</div>
      <button class="btn btn-secondary btn-icon" id="modal-close">✕</button>
    </div>
    <div id="modal-alert" class="alert hidden"></div>
    <form id="lead-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nome completo *</label>
          <input id="f-nome" type="text" class="form-control" placeholder="João Silva" required>
        </div>
        <div class="form-group">
          <label class="form-label">E-mail *</label>
          <input id="f-email" type="email" class="form-control" placeholder="joao@empresa.com" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Telefone</label>
          <input id="f-telefone" type="tel" class="form-control" placeholder="(11) 99999-9999">
        </div>
        <div class="form-group">
          <label class="form-label">Empresa</label>
          <input id="f-empresa" type="text" class="form-control" placeholder="Empresa S.A.">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Cargo</label>
          <input id="f-cargo" type="text" class="form-control" placeholder="Gerente de TI">
        </div>
        <div class="form-group">
          <label class="form-label">Data de captura</label>
          <input id="f-data" type="date" class="form-control">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Fonte</label>
          <select id="f-fonte" class="form-control">
            <option value="indicacao">Indicação</option>
            <option value="site">Site</option>
            <option value="evento">Evento</option>
            <option value="redes_sociais">Redes Sociais</option>
            <option value="email_marketing">E-mail Marketing</option>
            <option value="outros" selected>Outros</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select id="f-status" class="form-control">
            <option value="novo" selected>Novo</option>
            <option value="em_contato">Em Contato</option>
            <option value="qualificado">Qualificado</option>
            <option value="perdido">Perdido</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notas</label>
        <textarea id="f-notas" class="form-control" placeholder="Observações sobre o lead…"></textarea>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
        <button type="button" class="btn btn-secondary" id="modal-cancel" onclick="document.getElementById('modal-overlay').classList.add('hidden')">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar Lead</button>
      </div>
    </form>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/leads.js"></script>
</body>
</html>
