<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoundStream — Login</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-icon">🎵</span>
        <h1>SoundStream</h1>
      </div>

      <h2>Entrar na sua conta</h2>

      <div id="alert" class="alert"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Entrar</button>
      </form>

      <p class="auth-link">Não tem conta? <a href="/register">Cadastre-se</a></p>
    </div>
  </div>

  <script src="/static/js/auth.js"></script>
  <script>
    // Redireciona se já estiver logado
    const _u = getUser();
    if (_u && getToken()) redirectByRole(_u);

    const alertEl = document.getElementById('alert');

    function showAlert(type, msg) {
      alertEl.className = `alert alert-${type}`;
      alertEl.textContent = msg;
      alertEl.style.display = 'block';
    }

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Entrando...';
      alertEl.style.display = 'none';

      try {
        await login(
          document.getElementById('email').value.trim(),
          document.getElementById('password').value,
        );
      } catch (err) {
        showAlert('error', err.message);
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
