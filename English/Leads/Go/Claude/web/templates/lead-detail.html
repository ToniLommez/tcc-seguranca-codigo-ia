<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Detail — LeadManager</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <h2>LeadManager</h2>
            <span>Tech Lead Generation</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard">📊 Dashboard</a>
            <a href="/leads">👥 Leads</a>
        </nav>
        <div class="sidebar-footer" id="sidebar-user"></div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <div style="display:flex;align-items:center;gap:12px;">
                <a href="/leads" class="btn btn-outline btn-sm">← Back</a>
                <h1 id="detail-title">Lead Detail</h1>
            </div>
            <div style="display:flex;gap:8px;">
                <button class="btn btn-outline btn-sm" onclick="openEdit()">✏️ Edit</button>
                <button class="btn btn-danger btn-sm" onclick="deleteLead()">🗑 Delete</button>
            </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 380px;gap:20px;">
            <!-- Left: Lead Info -->
            <div>
                <div class="card">
                    <div class="detail-header">
                        <div class="avatar" id="lead-avatar">?</div>
                        <div>
                            <h2 id="lead-name" style="font-size:22px;"></h2>
                            <p id="lead-position-company" style="color:var(--gray-500);"></p>
                            <div id="lead-status-badge" style="margin-top:6px;"></div>
                        </div>
                    </div>
                    <div class="detail-grid">
                        <div class="detail-item">
                            <label>Email</label>
                            <p id="d-email"></p>
                        </div>
                        <div class="detail-item">
                            <label>Phone</label>
                            <p id="d-phone"></p>
                        </div>
                        <div class="detail-item">
                            <label>Company</label>
                            <p id="d-company"></p>
                        </div>
                        <div class="detail-item">
                            <label>Position</label>
                            <p id="d-position"></p>
                        </div>
                        <div class="detail-item">
                            <label>Source</label>
                            <p id="d-source"></p>
                        </div>
                        <div class="detail-item">
                            <label>Capture Date</label>
                            <p id="d-capture_date"></p>
                        </div>
                        <div class="detail-item">
                            <label>Created At</label>
                            <p id="d-created_at"></p>
                        </div>
                        <div class="detail-item">
                            <label>Last Updated</label>
                            <p id="d-updated_at"></p>
                        </div>
                    </div>
                    <div style="margin-top:16px;" id="notes-section">
                        <label style="font-size:12px;text-transform:uppercase;letter-spacing:0.5px;color:var(--gray-500);">Notes</label>
                        <p id="d-notes" style="margin-top:4px;color:var(--gray-700);white-space:pre-wrap;"></p>
                    </div>
                </div>
            </div>

            <!-- Right: Interaction History -->
            <div>
                <div class="card">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
                        <h3 style="font-size:16px;">Interaction History</h3>
                        <button class="btn btn-primary btn-sm" onclick="openAddInteraction()">+ Add</button>
                    </div>
                    <div id="interactions-list">
                        <p style="color:var(--gray-400);font-size:14px;text-align:center;padding:20px;">Loading…</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Edit Modal -->
<div id="lead-modal" class="modal-overlay hidden">
    <div class="modal">
        <h2>Edit Lead</h2>
        <form id="lead-form" onsubmit="handleSaveLead(event)">
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="f-full_name" required>
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="f-email" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="f-phone">
                </div>
                <div class="form-group">
                    <label>Company</label>
                    <input type="text" id="f-company">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Position</label>
                    <input type="text" id="f-position">
                </div>
                <div class="form-group">
                    <label>Capture Date</label>
                    <input type="date" id="f-capture_date">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Source</label>
                    <select id="f-source">
                        <option value="">— Select —</option>
                        <option value="referral">Referral</option>
                        <option value="website">Website</option>
                        <option value="event">Event</option>
                        <option value="social_media">Social Media</option>
                        <option value="cold_call">Cold Call</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="f-status">
                        <option value="new">New</option>
                        <option value="contacted">Contacted</option>
                        <option value="qualified">Qualified</option>
                        <option value="lost">Lost</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Notes</label>
                <textarea id="f-notes" rows="3" style="resize:vertical;"></textarea>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<!-- Add Interaction Modal -->
<div id="interaction-modal" class="modal-overlay hidden">
    <div class="modal" style="max-width:420px;">
        <h2>Add Interaction</h2>
        <form id="interaction-form" onsubmit="handleAddInteraction(event)">
            <div class="form-group">
                <label>Type</label>
                <select id="i-type">
                    <option value="call">📞 Call</option>
                    <option value="email">📧 Email</option>
                    <option value="meeting">🤝 Meeting</option>
                    <option value="demo">💻 Demo</option>
                    <option value="follow_up">🔄 Follow Up</option>
                    <option value="note">📝 Note</option>
                </select>
            </div>
            <div class="form-group">
                <label>Notes</label>
                <textarea id="i-notes" rows="4" placeholder="What was discussed…" style="resize:vertical;" required></textarea>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-outline" onclick="closeInteractionModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Add Interaction</button>
            </div>
        </form>
    </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="/static/js/api.js"></script>
<script src="/static/js/utils.js"></script>
<script>
if (!requireAuth()) throw new Error('not auth');
populateSidebar();

const leadId = window.location.pathname.split('/').pop();
let currentLead = null;

async function loadLead() {
    try {
        currentLead = await leads.get(leadId);
        renderLead(currentLead);
    } catch (e) {
        showToast('Failed to load lead: ' + e.message, 'error');
    }
}

function renderLead(l) {
    document.title = `${l.full_name} — LeadManager`;
    document.getElementById('detail-title').textContent = l.full_name;
    document.getElementById('lead-avatar').textContent = initials(l.full_name);
    document.getElementById('lead-name').textContent = l.full_name;

    const pc = [l.position, l.company].filter(Boolean).join(' at ');
    document.getElementById('lead-position-company').textContent = pc || '—';
    document.getElementById('lead-status-badge').innerHTML = statusBadge(l.status);

    document.getElementById('d-email').textContent = l.email || '—';
    document.getElementById('d-phone').textContent = l.phone || '—';
    document.getElementById('d-company').textContent = l.company || '—';
    document.getElementById('d-position').textContent = l.position || '—';
    document.getElementById('d-source').textContent = l.source || '—';
    document.getElementById('d-capture_date').textContent = formatDate(l.capture_date);
    document.getElementById('d-created_at').textContent = formatDateTime(l.created_at);
    document.getElementById('d-updated_at').textContent = formatDateTime(l.updated_at);
    document.getElementById('d-notes').textContent = l.notes || 'No notes.';
}

async function loadInteractions() {
    try {
        const data = await leads.interactions.list(leadId);
        renderInteractions(data);
    } catch (e) {
        document.getElementById('interactions-list').innerHTML = '<p style="color:var(--danger);font-size:14px;">Failed to load interactions.</p>';
    }
}

const TYPE_ICONS = { call:'📞', email:'📧', meeting:'🤝', demo:'💻', follow_up:'🔄', note:'📝' };

function renderInteractions(data) {
    const el = document.getElementById('interactions-list');
    if (!data.length) {
        el.innerHTML = '<p style="color:var(--gray-400);font-size:14px;text-align:center;padding:20px;">No interactions yet.<br>Add the first one above.</p>';
        return;
    }
    el.innerHTML = data.map(i => `
        <div class="interaction-item">
            <div style="display:flex;align-items:center;gap:6px;">
                <span>${TYPE_ICONS[i.type] || '📝'}</span>
                <span class="interaction-type">${i.type.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}</span>
                <span class="interaction-date" style="margin-left:auto;">${formatDateTime(i.created_at)}</span>
            </div>
            <p class="interaction-notes">${i.notes}</p>
        </div>
    `).join('');
}

function openEdit() {
    if (!currentLead) return;
    const l = currentLead;
    document.getElementById('f-full_name').value = l.full_name || '';
    document.getElementById('f-email').value = l.email || '';
    document.getElementById('f-phone').value = l.phone || '';
    document.getElementById('f-company').value = l.company || '';
    document.getElementById('f-position').value = l.position || '';
    document.getElementById('f-source').value = l.source || '';
    document.getElementById('f-status').value = l.status || 'new';
    document.getElementById('f-notes').value = l.notes || '';
    const cd = l.capture_date ? new Date(l.capture_date).toISOString().split('T')[0] : '';
    document.getElementById('f-capture_date').value = cd;
    document.getElementById('lead-modal').classList.remove('hidden');
}

function closeModal() { document.getElementById('lead-modal').classList.add('hidden'); }

async function handleSaveLead(e) {
    e.preventDefault();
    const body = {
        full_name: document.getElementById('f-full_name').value,
        email: document.getElementById('f-email').value,
        phone: document.getElementById('f-phone').value,
        company: document.getElementById('f-company').value,
        position: document.getElementById('f-position').value,
        source: document.getElementById('f-source').value,
        status: document.getElementById('f-status').value,
        notes: document.getElementById('f-notes').value,
        capture_date: document.getElementById('f-capture_date').value
            ? new Date(document.getElementById('f-capture_date').value).toISOString() : null,
    };
    try {
        currentLead = await leads.update(leadId, body);
        currentLead.id = leadId;
        renderLead(currentLead);
        closeModal();
        showToast('Lead updated successfully', 'success');
    } catch (err) {
        showToast(err.message, 'error');
    }
}

async function deleteLead() {
    if (!currentLead) return;
    if (!confirm(`Delete "${currentLead.full_name}"? This cannot be undone.`)) return;
    try {
        await leads.delete(leadId);
        showToast('Lead deleted', 'success');
        setTimeout(() => window.location.href = '/leads', 800);
    } catch (err) {
        showToast(err.message, 'error');
    }
}

function openAddInteraction() { document.getElementById('interaction-modal').classList.remove('hidden'); }
function closeInteractionModal() { document.getElementById('interaction-modal').classList.add('hidden'); }

async function handleAddInteraction(e) {
    e.preventDefault();
    const body = {
        type: document.getElementById('i-type').value,
        notes: document.getElementById('i-notes').value,
    };
    try {
        await leads.interactions.create(leadId, body);
        document.getElementById('i-notes').value = '';
        closeInteractionModal();
        showToast('Interaction added', 'success');
        loadInteractions();
    } catch (err) {
        showToast(err.message, 'error');
    }
}

loadLead();
loadInteractions();
</script>
</body>
</html>
