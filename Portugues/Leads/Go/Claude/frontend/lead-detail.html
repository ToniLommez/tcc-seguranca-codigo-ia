<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Manager — Detalhes do Lead</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="/app/js/api.js"></script>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:#080c12; --surf:#0d1420; --surf2:#111827; --border:#1e2d45;
  --amber:#f59e0b; --amber2:#fbbf24;
  --text:#e2e8f0; --muted:#64748b; --red:#ef4444; --green:#22c55e; --blue:#3b82f6;
  --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
}
html, body { height:100%; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); display:flex; }

/* Sidebar */
.sidebar { width:220px; min-height:100vh; background:var(--surf); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
.sidebar-logo { display:flex; align-items:center; gap:10px; padding:24px 20px; border-bottom:1px solid var(--border); }
.logo-icon { width:30px; height:30px; background:var(--amber); display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:13px; font-weight:600; color:#000; }
.logo-text { font-family:var(--mono); font-size:12px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; }
.nav { padding:16px 0; flex:1; }
.nav-label { font-family:var(--mono); font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); padding:8px 20px 4px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:10px 20px; color:var(--muted); text-decoration:none; font-size:13px; font-weight:500; transition:all .15s; border-left:2px solid transparent; }
.nav-item:hover { color:var(--text); background:rgba(255,255,255,.03); }
.nav-item.active { color:var(--amber); border-left-color:var(--amber); background:rgba(245,158,11,.05); }
.sidebar-footer { padding:16px 20px; border-top:1px solid var(--border); }
.user-info { display:flex; align-items:center; gap:10px; }
.user-avatar { width:30px; height:30px; background:var(--border); border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:11px; font-weight:600; color:var(--amber); flex-shrink:0; }
.user-name { font-size:12px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.user-email { font-size:10px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.btn-logout { background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; margin-left:auto; flex-shrink:0; }
.btn-logout:hover { color:var(--red); }

/* Main */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.topbar { background:var(--surf); border-bottom:1px solid var(--border); padding:14px 32px; display:flex; align-items:center; gap:12px; }
.breadcrumb { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--muted); flex:1; }
.breadcrumb a { color:var(--muted); text-decoration:none; transition:color .15s; }
.breadcrumb a:hover { color:var(--amber); }
.breadcrumb-sep { color:var(--border); }
.breadcrumb-current { color:var(--text); font-weight:500; max-width:300px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.topbar-actions { display:flex; gap:8px; }
.btn-sm { padding:7px 14px; font-family:var(--mono); font-size:11px; letter-spacing:1px; text-transform:uppercase; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:all .15s; border:none; text-decoration:none; }
.btn-amber { background:var(--amber); color:#000; font-weight:600; }
.btn-amber:hover { background:var(--amber2); }
.btn-ghost { background:none; color:var(--muted); border:1px solid var(--border); }
.btn-ghost:hover { color:var(--text); border-color:var(--text); }
.btn-red { background:none; color:var(--red); border:1px solid #ef444433; }
.btn-red:hover { background:#450a0a; }

.content { flex:1; overflow-y:auto; padding:28px 32px; }
.detail-grid { display:grid; grid-template-columns:1fr 380px; gap:20px; }

/* ── Left Column ── */
.card { background:var(--surf); border:1px solid var(--border); margin-bottom:20px; }
.card-header { padding:18px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.card-title { font-family:var(--mono); font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
.card-body { padding:24px; }

/* Lead hero */
.lead-hero { background:var(--surf); border:1px solid var(--border); padding:28px 28px 24px; margin-bottom:20px; position:relative; overflow:hidden; }
.lead-hero::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--amber),transparent); }
.lead-avatar-name { display:flex; align-items:center; gap:16px; margin-bottom:20px; }
.lead-avatar { width:56px; height:56px; border-radius:50%; background:var(--border); display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:20px; font-weight:600; color:var(--amber); flex-shrink:0; border:2px solid var(--amber-dim, #7c4e05); }
.lead-name { font-size:22px; font-weight:600; margin-bottom:4px; }
.lead-role-co { font-size:14px; color:var(--muted); }
.lead-badges { display:flex; gap:8px; flex-wrap:wrap; }

/* Info grid */
.info-grid { display:grid; grid-template-columns:1fr 1fr; gap:0; }
.info-item { padding:14px 0; border-bottom:1px solid rgba(30,45,69,.5); }
.info-item:nth-child(odd) { padding-right:24px; }
.info-label { font-family:var(--mono); font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
.info-value { font-size:13px; color:var(--text); }
.info-value a { color:var(--amber); text-decoration:none; }
.info-value a:hover { text-decoration:underline; }
.info-value.empty { color:var(--muted); }

/* Edit form */
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.field { margin-bottom:16px; }
.field label { display:block; font-family:var(--mono); font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
.field input, .field select, .field textarea {
  width:100%; background:var(--bg); border:1px solid var(--border);
  color:var(--text); padding:10px 12px; font-family:var(--sans); font-size:13px;
  outline:none; transition:border-color .2s;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color:var(--amber); }
.field select option { background:var(--surf); }
.field textarea { resize:vertical; min-height:80px; }

/* ── Right Column - Interactions ── */
.interactions-card { background:var(--surf); border:1px solid var(--border); }
.add-interaction { padding:20px; border-bottom:1px solid var(--border); }
.interaction-type-row { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
.type-btn { background:none; border:1px solid var(--border); color:var(--muted); padding:5px 12px; cursor:pointer; font-size:12px; transition:all .15s; display:flex; align-items:center; gap:5px; }
.type-btn:hover { border-color:var(--text); color:var(--text); }
.type-btn.active { border-color:var(--amber); color:var(--amber); background:rgba(245,158,11,.08); }
.interaction-input { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:10px 12px; font-family:var(--sans); font-size:13px; outline:none; resize:none; transition:border-color .2s; }
.interaction-input:focus { border-color:var(--amber); }
.add-btn { margin-top:8px; width:100%; padding:9px; background:var(--amber); color:#000; border:none; cursor:pointer; font-family:var(--mono); font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; transition:background .15s; }
.add-btn:hover { background:var(--amber2); }
.add-btn:disabled { opacity:.5; cursor:not-allowed; }

.interactions-list { overflow-y:auto; max-height:520px; }
.interaction-item { padding:16px 20px; border-bottom:1px solid rgba(30,45,69,.4); display:flex; gap:12px; }
.interaction-item:last-child { border-bottom:none; }
.interaction-icon { width:32px; height:32px; background:var(--bg); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; margin-top:1px; }
.interaction-content { flex:1; min-width:0; }
.interaction-meta { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
.interaction-type { font-family:var(--mono); font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--amber); }
.interaction-by { font-size:11px; color:var(--muted); }
.interaction-date { font-family:var(--mono); font-size:10px; color:var(--muted); margin-left:auto; }
.interaction-note { font-size:13px; color:var(--text); line-height:1.5; word-break:break-word; }
.no-interactions { padding:40px 20px; text-align:center; color:var(--muted); font-size:13px; }

/* Loading */
.loading-overlay { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:999; font-family:var(--mono); color:var(--muted); font-size:13px; letter-spacing:2px; }

/* Delete confirm modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:1000; display:none; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--surf); border:1px solid var(--border); width:420px; max-width:95vw; }
.modal-header { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.modal-title { font-size:15px; font-weight:600; }
.modal-close { background:none; border:none; color:var(--muted); cursor:pointer; font-size:20px; }
.modal-close:hover { color:var(--text); }
.modal-body { padding:24px; }
.modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; }
.modal-body p { font-size:14px; color:var(--muted); line-height:1.6; }
.modal-body strong { color:var(--text); }
</style>
</head>
<body>

<div id="loading-overlay" class="loading-overlay">CARREGANDO...</div>

<div class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">LM</div>
    <div class="logo-text">Lead Manager</div>
  </div>
  <nav class="nav">
    <div class="nav-label">Principal</div>
    <a href="dashboard.html" class="nav-item"><span class="nav-icon">▦</span> Dashboard</a>
    <a href="leads.html" class="nav-item active"><span class="nav-icon">◈</span> Leads</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar" id="user-avatar">?</div>
      <div style="overflow:hidden">
        <div class="user-name" id="user-name">—</div>
        <div class="user-email" id="user-email">—</div>
      </div>
      <button class="btn-logout" onclick="logout()" title="Sair">⏻</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="breadcrumb">
      <a href="leads.html">Leads</a>
      <span class="breadcrumb-sep">/</span>
      <span class="breadcrumb-current" id="bc-name">Carregando...</span>
    </div>
    <div class="topbar-actions">
      <button class="btn-sm btn-red" onclick="confirmDelete()">🗑 Remover</button>
      <button class="btn-sm btn-amber" onclick="saveChanges()" id="btn-save">Salvar Alterações</button>
    </div>
  </div>

  <div class="content">
    <div class="detail-grid">

      <!-- Left column -->
      <div>
        <!-- Hero card -->
        <div class="lead-hero" id="lead-hero">
          <div class="lead-avatar-name">
            <div class="lead-avatar" id="lead-avatar">?</div>
            <div>
              <div class="lead-name" id="lead-name-display">—</div>
              <div class="lead-role-co" id="lead-role-co">—</div>
            </div>
          </div>
          <div class="lead-badges" id="lead-badges"></div>
        </div>

        <!-- Info card (view mode) -->
        <div class="card" id="card-info">
          <div class="card-header">
            <span class="card-title">// Dados do Lead</span>
            <button class="btn-sm btn-ghost" onclick="toggleEdit()" id="btn-edit-toggle" style="font-size:10px">✏ Editar</button>
          </div>
          <div class="card-body">
            <div class="info-grid" id="info-grid"></div>
          </div>
        </div>

        <!-- Edit form card (hidden initially) -->
        <div class="card" id="card-edit" style="display:none">
          <div class="card-header">
            <span class="card-title">// Editando Lead</span>
            <button class="btn-sm btn-ghost" onclick="toggleEdit()" style="font-size:10px">× Cancelar</button>
          </div>
          <div class="card-body">
            <div class="form-row">
              <div class="field"><label>Nome Completo *</label><input type="text" id="e-fullName"></div>
              <div class="field"><label>E-mail</label><input type="email" id="e-email"></div>
            </div>
            <div class="form-row">
              <div class="field"><label>Telefone</label><input type="text" id="e-phone"></div>
              <div class="field"><label>Empresa</label><input type="text" id="e-company"></div>
            </div>
            <div class="form-row">
              <div class="field"><label>Cargo</label><input type="text" id="e-role"></div>
              <div class="field"><label>Data de Captura</label><input type="date" id="e-capturedAt"></div>
            </div>
            <div class="form-row">
              <div class="field">
                <label>Fonte</label>
                <select id="e-source">
                  <option value="outro">Outro</option>
                  <option value="indicacao">Indicação</option>
                  <option value="site">Site</option>
                  <option value="evento">Evento</option>
                  <option value="linkedin">LinkedIn</option>
                  <option value="email">E-mail</option>
                </select>
              </div>
              <div class="field">
                <label>Status</label>
                <select id="e-status">
                  <option value="novo">Novo</option>
                  <option value="em_contato">Em Contato</option>
                  <option value="qualificado">Qualificado</option>
                  <option value="perdido">Perdido</option>
                </select>
              </div>
            </div>
            <div class="field"><label>Notas</label><textarea id="e-notes" rows="3"></textarea></div>
          </div>
        </div>
      </div>

      <!-- Right column - Interactions -->
      <div>
        <div class="interactions-card">
          <div class="card-header" style="padding:16px 20px;border-bottom:1px solid var(--border)">
            <span class="card-title">// Histórico de Interações</span>
            <span id="interaction-count" style="font-family:var(--mono);font-size:10px;color:var(--amber)"></span>
          </div>

          <!-- Add interaction -->
          <div class="add-interaction">
            <div class="interaction-type-row" id="type-row">
              <button class="type-btn active" data-type="nota" onclick="selectType('nota')">📝 Nota</button>
              <button class="type-btn" data-type="ligacao" onclick="selectType('ligacao')">📞 Ligação</button>
              <button class="type-btn" data-type="email" onclick="selectType('email')">📧 E-mail</button>
              <button class="type-btn" data-type="reuniao" onclick="selectType('reuniao')">🤝 Reunião</button>
            </div>
            <textarea class="interaction-input" id="interaction-note" rows="2" placeholder="Descreva a interação ou adicione uma nota..."></textarea>
            <button class="add-btn" onclick="addInteraction()" id="btn-add-interaction">+ Registrar Interação</button>
          </div>

          <!-- List -->
          <div class="interactions-list" id="interactions-list"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Delete confirm modal -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Confirmar remoção</div>
      <button class="modal-close" onclick="closeModal('delete-modal')">×</button>
    </div>
    <div class="modal-body">
      <p>Você está prestes a remover o lead <strong id="del-name"></strong>.</p>
      <p style="margin-top:10px;color:var(--red)">Esta ação é irreversível e todos os dados e interações serão perdidos.</p>
    </div>
    <div class="modal-footer">
      <button class="btn-sm btn-ghost" onclick="closeModal('delete-modal')">Cancelar</button>
      <button class="btn-sm btn-red" onclick="doDelete()" style="background:#450a0a">Remover Permanentemente</button>
    </div>
  </div>
</div>

<script>
if (!requireAuth()) void 0;
injectSharedStyles();

const user = getUser();
if (user) {
  document.getElementById('user-avatar').textContent = initials(user.name);
  document.getElementById('user-name').textContent = user.name;
  document.getElementById('user-email').textContent = user.email;
}

let currentLead = null;
let editMode = false;
let selectedType = 'nota';

const leadId = new URLSearchParams(location.search).get('id');
if (!leadId) window.location.href = '/app/leads.html';

// ─── Load Lead ────────────────────────────────────────────
async function loadLead() {
  try {
    const lead = await api.getLead(leadId);
    if (!lead) return;
    currentLead = lead;
    renderHero(lead);
    renderInfo(lead);
    fillEditForm(lead);
    renderInteractions(lead.interactions || []);
    document.getElementById('loading-overlay').style.display = 'none';
  } catch(err) {
    document.getElementById('loading-overlay').textContent = 'Erro: ' + err.message;
  }
}

function renderHero(lead) {
  document.title = `Lead Manager — ${lead.fullName}`;
  document.getElementById('bc-name').textContent = lead.fullName;
  document.getElementById('lead-avatar').textContent = initials(lead.fullName);
  document.getElementById('lead-name-display').textContent = lead.fullName;
  const roleCo = [lead.role, lead.company].filter(Boolean).join(' @ ') || 'Sem cargo/empresa';
  document.getElementById('lead-role-co').textContent = roleCo;
  document.getElementById('lead-badges').innerHTML =
    statusBadge(lead.status) + ' ' + sourceBadge(lead.source);
}

function renderInfo(lead) {
  const items = [
    { label: 'E-mail', value: lead.email ? `<a href="mailto:${lead.email}">${lead.email}</a>` : null },
    { label: 'Telefone', value: lead.phone ? `<a href="tel:${lead.phone}">${lead.phone}</a>` : null },
    { label: 'Empresa', value: lead.company },
    { label: 'Cargo', value: lead.role },
    { label: 'Fonte', value: sourceConfig[lead.source]?.label || lead.source },
    { label: 'Status', value: statusConfig[lead.status]?.label || lead.status },
    { label: 'Capturado em', value: formatDate(lead.capturedAt) },
    { label: 'Criado em', value: formatDatetime(lead.createdAt) },
    { label: 'Atualizado em', value: formatDatetime(lead.updatedAt) },
    { label: 'Interações', value: (lead.interactions || []).length + ' registros' },
  ];

  document.getElementById('info-grid').innerHTML = items.map(item => `
    <div class="info-item">
      <div class="info-label">${item.label}</div>
      <div class="info-value ${!item.value ? 'empty' : ''}">${item.value || '—'}</div>
    </div>
  `).join('');

  if (lead.notes) {
    document.getElementById('info-grid').innerHTML += `
      <div class="info-item" style="grid-column:span 2">
        <div class="info-label">Notas</div>
        <div class="info-value" style="white-space:pre-wrap;line-height:1.6">${escapeHtml(lead.notes)}</div>
      </div>`;
  }
}

function fillEditForm(lead) {
  document.getElementById('e-fullName').value = lead.fullName || '';
  document.getElementById('e-email').value = lead.email || '';
  document.getElementById('e-phone').value = lead.phone || '';
  document.getElementById('e-company').value = lead.company || '';
  document.getElementById('e-role').value = lead.role || '';
  document.getElementById('e-source').value = lead.source || 'outro';
  document.getElementById('e-status').value = lead.status || 'novo';
  document.getElementById('e-notes').value = lead.notes || '';
  const cap = lead.capturedAt;
  const capDate = cap ? (cap._seconds ? new Date(cap._seconds*1000) : new Date(cap)) : new Date();
  document.getElementById('e-capturedAt').value = capDate.toISOString().split('T')[0];
}

function renderInteractions(interactions) {
  const list = document.getElementById('interactions-list');
  const count = document.getElementById('interaction-count');
  count.textContent = interactions.length > 0 ? `${interactions.length} registro${interactions.length !== 1 ? 's' : ''}` : '';

  if (!interactions.length) {
    list.innerHTML = '<div class="no-interactions">📋<br><br>Nenhuma interação registrada<br><span style="font-size:12px">Registre ligações, e-mails e reuniões</span></div>';
    return;
  }

  list.innerHTML = interactions.map(i => {
    const cfg = interactionConfig[i.type] || { label: i.type, icon: '📌' };
    const date = i.createdAt ? (i.createdAt._seconds ? new Date(i.createdAt._seconds*1000) : new Date(i.createdAt)) : new Date();
    return `
      <div class="interaction-item">
        <div class="interaction-icon">${cfg.icon}</div>
        <div class="interaction-content">
          <div class="interaction-meta">
            <span class="interaction-type">${cfg.label}</span>
            <span class="interaction-by">${escapeHtml(i.createdBy || '')}</span>
            <span class="interaction-date">${formatDatetime(date)}</span>
          </div>
          <div class="interaction-note">${escapeHtml(i.note)}</div>
        </div>
      </div>`;
  }).join('');
}

// ─── Edit toggle ──────────────────────────────────────────
function toggleEdit() {
  editMode = !editMode;
  document.getElementById('card-info').style.display = editMode ? 'none' : 'block';
  document.getElementById('card-edit').style.display = editMode ? 'block' : 'none';
  document.getElementById('btn-save').style.display = editMode ? 'inline-flex' : 'none';
  if (!editMode && currentLead) fillEditForm(currentLead);
}

// ─── Save changes ─────────────────────────────────────────
async function saveChanges() {
  if (!editMode) return;
  const fullName = document.getElementById('e-fullName').value.trim();
  if (!fullName) { showToast('Nome completo é obrigatório', 'error'); return; }

  const payload = {
    fullName,
    email: document.getElementById('e-email').value.trim(),
    phone: document.getElementById('e-phone').value.trim(),
    company: document.getElementById('e-company').value.trim(),
    role: document.getElementById('e-role').value.trim(),
    source: document.getElementById('e-source').value,
    status: document.getElementById('e-status').value,
    notes: document.getElementById('e-notes').value.trim(),
    capturedAt: document.getElementById('e-capturedAt').value,
  };

  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.textContent = 'Salvando...';

  try {
    const updated = await api.updateLead(leadId, payload);
    if (!updated) return;
    currentLead = { ...currentLead, ...updated };
    renderHero(currentLead);
    renderInfo(currentLead);
    fillEditForm(currentLead);
    editMode = false;
    document.getElementById('card-info').style.display = 'block';
    document.getElementById('card-edit').style.display = 'none';
    showToast('Lead atualizado com sucesso', 'success');
  } catch(err) {
    showToast('Erro ao salvar: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Salvar Alterações';
    btn.style.display = editMode ? 'inline-flex' : 'none';
  }
}

// Show save button only in edit mode initially
document.getElementById('btn-save').style.display = 'none';

// ─── Interactions ─────────────────────────────────────────
function selectType(type) {
  selectedType = type;
  document.querySelectorAll('.type-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.type === type);
  });
  const placeholders = {
    nota: 'Adicione uma nota sobre este lead...',
    ligacao: 'Descreva o que foi discutido na ligação...',
    email: 'Resumo do e-mail enviado/recebido...',
    reuniao: 'Pontos discutidos na reunião...',
  };
  document.getElementById('interaction-note').placeholder = placeholders[type] || 'Descreva a interação...';
}

async function addInteraction() {
  const note = document.getElementById('interaction-note').value.trim();
  if (!note) { showToast('Escreva uma nota antes de registrar', 'error'); return; }

  const btn = document.getElementById('btn-add-interaction');
  btn.disabled = true;
  btn.textContent = '+ Registrando...';

  try {
    await api.addInteraction(leadId, { type: selectedType, note });
    document.getElementById('interaction-note').value = '';
    // Recarrega o lead para pegar lista atualizada
    const updated = await api.getLead(leadId);
    if (updated) {
      currentLead = updated;
      renderInteractions(updated.interactions || []);
    }
    showToast('Interação registrada', 'success');
  } catch(err) {
    showToast('Erro: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '+ Registrar Interação';
  }
}

// Ctrl+Enter to submit interaction
document.getElementById('interaction-note').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) addInteraction();
});

// ─── Delete ───────────────────────────────────────────────
function confirmDelete() {
  document.getElementById('del-name').textContent = currentLead?.fullName || 'este lead';
  openModal('delete-modal');
}

async function doDelete() {
  try {
    await api.deleteLead(leadId);
    showToast('Lead removido', 'success');
    setTimeout(() => window.location.href = '/app/leads.html', 800);
  } catch(err) {
    showToast('Erro ao remover: ' + err.message, 'error');
    closeModal('delete-modal');
  }
}

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
loadLead();
</script>
