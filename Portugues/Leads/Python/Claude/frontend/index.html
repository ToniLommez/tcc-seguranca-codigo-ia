<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Manager — Login</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>Lead<span>Manager</span></h1>
      <p>Gestão inteligente de leads em tecnologia</p>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" data-pane="pane-login">Entrar</div>
      <div class="auth-tab" data-pane="pane-register">Criar conta</div>
    </div>

    <!-- Login -->
    <div id="pane-login" class="auth-pane active">
      <div id="login-alert" class="alert hidden"></div>
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">E-mail</label>
          <input id="login-email" type="email" class="form-control" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Senha</label>
          <input id="login-password" type="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px">Entrar</button>
      </form>
    </div>

    <!-- Register -->
    <div id="pane-register" class="auth-pane">
      <div id="register-alert" class="alert hidden"></div>
      <form id="register-form">
        <div class="form-group">
          <label class="form-label">Nome completo / Empresa</label>
          <input id="register-name" type="text" class="form-control" placeholder="João Silva" required>
        </div>
        <div class="form-group">
          <label class="form-label">E-mail</label>
          <input id="register-email" type="email" class="form-control" placeholder="seu@email.com" required>
        </div>
        <div class="form-row">
          <div class="form-group mb-0">
            <label class="form-label">Senha</label>
            <input id="register-password" type="password" class="form-control" placeholder="••••••••" required minlength="6">
          </div>
          <div class="form-group mb-0">
            <label class="form-label">Confirmar senha</label>
            <input id="register-confirm" type="password" class="form-control" placeholder="••••••••" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px;margin-top:16px">Criar conta</button>
      </form>
    </div>

    <div class="auth-footer">Lead Manager v1.0 · Claude + Python · Firebase</div>
  </div>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/auth.js"></script>
</body>
</html>
