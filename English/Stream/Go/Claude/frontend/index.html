<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicStream</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <!-- AUTH PAGE -->
    <div id="auth-page" class="auth-container">
        <div class="auth-box">
            <div class="logo">&#127925;</div>
            <h1 id="auth-title">Sign In</h1>
            <p class="subtitle" id="auth-subtitle">Welcome back to MusicStream</p>

            <div id="auth-alert" class="alert hidden"></div>

            <form id="auth-form">
                <div id="name-group" class="form-group hidden">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Your name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Min 6 characters" required>
                </div>
                <div id="type-group" class="form-group hidden">
                    <label for="user-type">Account Type</label>
                    <select id="user-type">
                        <option value="USER">Listener - Browse and play music</option>
                        <option value="ARTIST">Artist - Upload and manage songs</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" id="auth-btn">Sign In</button>
            </form>

            <div class="auth-switch">
                <span id="auth-switch-text">Don't have an account? </span>
                <a id="auth-switch-link" onclick="toggleAuthMode()">Create one</a>
            </div>
        </div>
    </div>

    <!-- APP PAGE -->
    <div id="app-page" class="app-layout hidden">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>&#127925; MusicStream</h2>
                <div class="user-info">
                    <div id="sidebar-username"></div>
                    <span class="user-type" id="sidebar-user-type"></span>
                </div>
            </div>

            <nav class="sidebar-nav" id="sidebar-nav"></nav>

            <div class="sidebar-footer">
                <button class="nav-item" onclick="logout()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Sign Out
                </button>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- ARTIST: UPLOAD -->
            <div id="page-upload" class="page hidden">
                <div class="page-header">
                    <h1>Upload Song</h1>
                    <p>Share your music with the world</p>
                </div>

                <div class="upload-form">
                    <div id="upload-alert" class="alert hidden"></div>

                    <form id="upload-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="song-title">Title</label>
                                <input type="text" id="song-title" placeholder="Song title" required>
                            </div>
                            <div class="form-group">
                                <label for="song-genre">Genre</label>
                                <input type="text" id="song-genre" placeholder="e.g. Pop, Rock, Jazz" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="song-description">Description (optional)</label>
                            <textarea id="song-description" rows="3" placeholder="Tell listeners about this song..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Music File (MP3 only)</label>
                            <div class="file-upload" id="file-upload-zone">
                                <input type="file" id="song-file" accept=".mp3,audio/mpeg">
                                <div class="file-upload-text" id="file-upload-text">
                                    <strong>Click to select</strong> or drag an MP3 file here
                                </div>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary" id="upload-btn">Upload Song</button>
                    </form>
                </div>
            </div>

            <!-- ARTIST: MY SONGS -->
            <div id="page-my-songs" class="page hidden">
                <div class="page-header">
                    <h1>My Songs</h1>
                    <p>Manage your uploaded music</p>
                </div>
                <div id="my-songs-list" class="songs-grid"></div>
            </div>

            <!-- USER: BROWSE -->
            <div id="page-browse" class="page hidden">
                <div class="page-header">
                    <h1>Browse Music</h1>
                    <p>Discover and listen to new songs</p>
                </div>
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="Search songs, artists, or genres...">
                    <select id="search-field">
                        <option value="">All Fields</option>
                        <option value="title">Title</option>
                        <option value="artist">Artist</option>
                        <option value="genre">Genre</option>
                    </select>
                </div>
                <div id="browse-songs-list" class="songs-grid"></div>
            </div>
        </main>
    </div>

    <!-- AUDIO PLAYER -->
    <div id="audio-player" class="audio-player">
        <div class="player-info">
            <div class="player-title" id="player-title">-</div>
            <div class="player-artist" id="player-artist">-</div>
        </div>

        <div class="player-controls">
            <button class="player-btn play-pause" id="player-play-btn" onclick="togglePlayPause()">
                <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor" width="20" height="20" class="hidden"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </button>
        </div>

        <div class="player-progress">
            <span class="time-display" id="current-time">0:00</span>
            <div class="progress-bar" id="progress-bar" onclick="seekAudio(event)">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <span class="time-display" id="total-time">0:00</span>
        </div>

        <div class="volume-control">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.01" value="0.7" oninput="setVolume(this.value)">
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
