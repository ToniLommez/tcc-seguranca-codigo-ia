<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamMusic — Painel do Ouvinte</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
<div class="dashboard" style="flex-direction:column">

  <div style="display:flex;flex:1;overflow:hidden">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg width="28" height="28" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z"/>
        </svg>
        <span>StreamMusic</span>
      </div>

      <nav>
        <div class="nav-section">
          <div class="nav-label">Descobrir</div>
          <a class="nav-item active" id="navAll">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            Todas as Músicas
          </a>
        </div>

        <div class="nav-section">
          <div class="nav-label">Gêneros</div>
          <a class="nav-item genre-nav" data-genre="">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
            Todos
          </a>
          <a class="nav-item genre-nav" data-genre="Pop">🎵 Pop</a>
          <a class="nav-item genre-nav" data-genre="Rock">🎸 Rock</a>
          <a class="nav-item genre-nav" data-genre="Sertanejo">🤠 Sertanejo</a>
          <a class="nav-item genre-nav" data-genre="Funk">🔥 Funk</a>
          <a class="nav-item genre-nav" data-genre="MPB">🇧🇷 MPB</a>
          <a class="nav-item genre-nav" data-genre="Eletrônica">⚡ Eletrônica</a>
          <a class="nav-item genre-nav" data-genre="Hip-Hop">🎤 Hip-Hop</a>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userInitial">U</div>
          <div class="user-details">
            <strong id="userName">Usuário</strong>
            <small id="userEmail"></small>
          </div>
        </div>
        <button class="btn btn-outline btn-full" id="logoutBtn" style="font-size:.85rem;padding:9px">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          Sair
        </button>
      </div>
    </aside>

    <!-- ── Main ── -->
    <div class="main-content">
      <header class="topbar">
        <div class="search-box">
          <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input type="text" id="searchInput" placeholder="Buscar por título ou artista...">
        </div>
        <select id="genreFilter" style="background:var(--surface2);border:1px solid var(--border);
                color:var(--text);padding:8px 14px;border-radius:8px;outline:none;font-size:.9rem">
          <option value="">Todos os gêneros</option>
          <option>Pop</option><option>Rock</option><option>Sertanejo</option>
          <option>Funk</option><option>Pagode</option><option>MPB</option>
          <option>Eletrônica</option><option>Hip-Hop</option><option>Jazz</option>
          <option>Clássica</option><option>Forró</option><option>Reggae</option><option>Outro</option>
        </select>
        <button class="btn btn-outline" id="clearSearch" style="padding:8px 14px;font-size:.85rem">
          Limpar
        </button>
      </header>

      <div class="content-area">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
          <div>
            <h2 style="font-size:1.4rem;font-weight:700">Catálogo de Músicas</h2>
            <p id="resultsLabel" style="color:var(--text-muted);font-size:.85rem;margin-top:2px">Carregando...</p>
          </div>
          <div style="display:flex;align-items:center;gap:8px;color:var(--text-muted);font-size:.85rem">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z"/>
            </svg>
            <span id="totalSongsCount">0</span> músicas
          </div>
        </div>

        <div id="songListContainer">
          <div class="spinner" style="margin-top:60px"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Player bar ── -->
  <div class="player-bar hidden" id="playerBar">
    <div class="now-playing">
      <div class="now-playing-cover">
        <svg width="24" height="24" fill="none" stroke="white" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z"/>
        </svg>
      </div>
      <div class="now-playing-info">
        <strong id="nowTitle">—</strong>
        <small id="nowArtist">—</small>
      </div>
    </div>

    <div class="player-controls">
      <div class="player-btns">
        <button class="btn-player" id="prevBtn" title="Anterior">
          <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
          </svg>
        </button>
        <button class="btn-player btn-player-main" id="playPauseBtn" title="Play/Pausa">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
            <path d="M8 5v14l11-7z"/>
          </svg>
        </button>
        <button class="btn-player" id="nextBtn" title="Próxima">
          <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
          </svg>
        </button>
      </div>

      <div class="progress-row">
        <span class="time-label" id="currentTime">0:00</span>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="time-label" id="totalTime">0:00</span>
      </div>
    </div>

    <div class="volume-ctrl">
      <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15.536 8.464a5 5 0 010 7.072M12 6v12m-3.536-9.536a5 5 0 000 7.072"/>
      </svg>
      <input type="range" id="volumeSlider" min="0" max="100" value="80">
    </div>
  </div>

</div><!-- /dashboard -->

<script src="/assets/js/api.js"></script>
<script src="/assets/js/user.js"></script>
</body>
</html>
