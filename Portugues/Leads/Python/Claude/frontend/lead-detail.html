<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Manager — Detalhe do Lead</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand"><h1>Lead<span>Manager</span></h1></div>
    <div class="sidebar-user">
      <div class="user-name" id="user-name">Carregando…</div>
      <div class="user-email" id="user-email"></div>
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="/leads" class="active">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Leads
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" id="logout-btn">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </a>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <a href="/leads" class="btn btn-secondary btn-sm">← Voltar</a>
        <div class="topbar-title">Detalhe do Lead</div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-primary" id="btn-edit">✏ Editar</button>
        <button class="btn btn-danger" id="btn-delete">🗑 Excluir</button>
      </div>
    </div>

    <div class="page-content">
      <div id="edit-alert" class="alert hidden"></div>

      <div class="detail-grid">
        <!-- Left: info + edit -->
        <div>
          <!-- View mode -->
          <div class="card" id="lead-view">
            <div class="detail-header">
              <div>
                <h2 id="lead-fullname" style="font-size:22px;font-weight:800;margin-bottom:8px">—</h2>
                <div id="lead-badges" style="display:flex;gap:8px;flex-wrap:wrap"></div>
              </div>
            </div>
            <div class="info-grid">
              <div class="info-item">
                <label>E-mail</label>
                <span id="info-email">—</span>
              </div>
              <div class="info-item">
                <label>Telefone</label>
                <span id="info-telefone">—</span>
              </div>
              <div class="info-item">
                <label>Empresa</label>
                <span id="info-empresa">—</span>
              </div>
              <div class="info-item">
                <label>Cargo</label>
                <span id="info-cargo">—</span>
              </div>
              <div class="info-item">
                <label>Data de captura</label>
                <span id="info-data">—</span>
              </div>
              <div class="info-item">
                <label>Criado em</label>
                <span id="info-criado">—</span>
              </div>
              <div class="info-item">
                <label>Atualizado em</label>
                <span id="info-atualizado">—</span>
              </div>
            </div>
            <div style="margin-top:16px;padding-top:16px;border-top:1px solid #f3f4f6">
              <div class="info-item">
                <label>Notas</label>
                <span id="info-notas" style="white-space:pre-wrap">—</span>
              </div>
            </div>
          </div>

          <!-- Edit mode -->
          <div class="card hidden" id="lead-edit">
            <h3 class="card-title">Editar Lead</h3>
            <form id="edit-form">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Nome completo *</label>
                  <input id="e-nome" type="text" class="form-control" required>
                </div>
                <div class="form-group">
                  <label class="form-label">E-mail *</label>
                  <input id="e-email" type="email" class="form-control" required>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Telefone</label>
                  <input id="e-telefone" type="tel" class="form-control">
                </div>
                <div class="form-group">
                  <label class="form-label">Empresa</label>
                  <input id="e-empresa" type="text" class="form-control">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Cargo</label>
                  <input id="e-cargo" type="text" class="form-control">
                </div>
                <div class="form-group">
                  <label class="form-label">Data de captura</label>
                  <input id="e-data" type="date" class="form-control">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Fonte</label>
                  <select id="e-fonte" class="form-control">
                    <option value="indicacao">Indicação</option>
                    <option value="site">Site</option>
                    <option value="evento">Evento</option>
                    <option value="redes_sociais">Redes Sociais</option>
                    <option value="email_marketing">E-mail Marketing</option>
                    <option value="outros">Outros</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">Status</label>
                  <select id="e-status" class="form-control">
                    <option value="novo">Novo</option>
                    <option value="em_contato">Em Contato</option>
                    <option value="qualificado">Qualificado</option>
                    <option value="perdido">Perdido</option>
                  </select>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Notas</label>
                <textarea id="e-notas" class="form-control" rows="3"></textarea>
              </div>
              <div style="display:flex;gap:10px;justify-content:flex-end">
                <button type="button" class="btn btn-secondary" id="btn-cancel">Cancelar</button>
                <button type="submit" class="btn btn-primary">Salvar Alterações</button>
              </div>
            </form>
          </div>
        </div>

        <!-- Right: interactions -->
        <div>
          <div class="card">
            <h3 class="card-title">Registrar Interação</h3>
            <form id="interaction-form">
              <div class="form-group">
                <label class="form-label">Tipo</label>
                <select id="i-tipo" class="form-control">
                  <option value="ligacao">📞 Ligação</option>
                  <option value="email">📧 E-mail</option>
                  <option value="reuniao">🤝 Reunião</option>
                  <option value="mensagem">💬 Mensagem</option>
                  <option value="outro">📝 Outro</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Data</label>
                <input id="i-data" type="date" class="form-control">
              </div>
              <div class="form-group">
                <label class="form-label">Descrição *</label>
                <textarea id="i-descricao" class="form-control" rows="3" placeholder="Descreva a interação…" required></textarea>
              </div>
              <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Registrar</button>
            </form>
          </div>

          <div class="card">
            <h3 class="card-title">Histórico de Interações</h3>
            <div id="interactions-list">
              <div class="empty-state"><p>Carregando…</p></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/lead-detail.js"></script>
</body>
</html>
