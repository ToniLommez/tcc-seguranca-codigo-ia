<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadManager — Sign In</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <h1>LeadManager</h1>
        <p>Sign in to your account</p>

        <div id="auth-tabs" style="display:flex;gap:8px;margin-bottom:24px;">
            <button class="btn btn-primary" id="tab-login" onclick="showTab('login')">Sign In</button>
            <button class="btn btn-outline" id="tab-signup" onclick="showTab('signup')">Create Account</button>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@company.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <div id="login-error" style="color:#dc2626;font-size:14px;margin-bottom:12px;"></div>
            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>

        <form id="signup-form" class="hidden" onsubmit="handleSignup(event)">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Jane Smith" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@company.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Min. 6 characters" required minlength="6">
            </div>
            <div id="signup-error" style="color:#dc2626;font-size:14px;margin-bottom:12px;"></div>
            <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        </form>
    </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="/static/js/api.js"></script>
<script src="/static/js/utils.js"></script>
<script>
    if (getToken()) window.location.href = '/dashboard';

    function showTab(tab) {
        document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
        document.getElementById('signup-form').classList.toggle('hidden', tab !== 'signup');
        document.getElementById('tab-login').className = tab === 'login' ? 'btn btn-primary' : 'btn btn-outline';
        document.getElementById('tab-signup').className = tab === 'signup' ? 'btn btn-primary' : 'btn btn-outline';
    }

    async function handleLogin(e) {
        e.preventDefault();
        const fd = new FormData(e.target);
        document.getElementById('login-error').textContent = '';
        try {
            const res = await auth.login({ email: fd.get('email'), password: fd.get('password') });
            setAuth(res.token, res.user);
            window.location.href = '/dashboard';
        } catch (err) {
            document.getElementById('login-error').textContent = err.message;
        }
    }

    async function handleSignup(e) {
        e.preventDefault();
        const fd = new FormData(e.target);
        document.getElementById('signup-error').textContent = '';
        try {
            const res = await auth.signup({ name: fd.get('name'), email: fd.get('email'), password: fd.get('password') });
            setAuth(res.token, res.user);
            window.location.href = '/dashboard';
        } catch (err) {
            document.getElementById('signup-error').textContent = err.message;
        }
    }
</script>
</body>
</html>
