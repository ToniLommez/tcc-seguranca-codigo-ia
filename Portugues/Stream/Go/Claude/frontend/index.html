<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamMusic — Entrar</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-icon">🎵</span>
        <h1>StreamMusic</h1>
        <p>Sua plataforma de streaming</p>
      </div>

      <div class="alert" id="loginAlert"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">Entrar</button>
      </form>

      <div class="auth-footer">
        Não tem conta? <a href="/register.html">Cadastre-se</a>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
