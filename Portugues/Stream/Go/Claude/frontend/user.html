<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamMusic — Ouvir Músicas</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-mark">🎵 StreamMusic <span>Plataforma de streaming</span></div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-label">Navegar</div>
        <a class="nav-item active" href="#">
          <span class="icon">🏠</span> Início
        </a>
        <a class="nav-item" href="#" onclick="runSearch();return false;">
          <span class="icon">🔍</span> Buscar
        </a>
      </nav>

      <div class="sidebar-user">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">U</div>
          <div>
            <div class="user-name" id="userName">Carregando…</div>
            <span class="user-badge badge-user">OUVINTE</span>
          </div>
        </div>
        <button class="btn btn-danger" id="logoutBtn">Sair</button>
      </div>
    </aside>

    <!-- Main content (header + body + player) -->
    <div class="main-content">
      <!-- Header with search -->
      <div class="content-header">
        <h2 id="sectionTitle">Todas as músicas</h2>
      </div>

      <!-- Search bar -->
      <div style="padding: 16px 32px 0; flex-shrink:0; border-bottom: 1px solid var(--border);">
        <div class="search-bar">
          <input type="text" id="searchTitle"  placeholder="🔍 Buscar por título…">
          <input type="text" id="searchArtist" placeholder="🎤 Artista…">
          <input type="text" id="searchGenre"  placeholder="🎸 Gênero…">
          <button class="btn-search" id="btnSearch">Buscar</button>
          <button class="btn-clear"  id="btnClear">Limpar</button>
        </div>
      </div>

      <!-- Music grid -->
      <div class="content-body">
        <div class="empty-state" id="emptyState" style="display:none">
          <div class="empty-icon">🎵</div>
          <p>Nenhuma música encontrada.</p>
        </div>

        <div class="music-grid" id="musicGrid">
          <div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:48px">
            <span class="spinner"></span> Carregando músicas…
          </div>
        </div>
      </div>

      <!-- Player bar -->
      <div class="player-bar">
        <!-- Track info -->
        <div class="player-info" id="playerInfo" style="display:none">
          <div class="player-art">🎵</div>
          <div>
            <div class="player-track-name"   id="playerTrackName">—</div>
            <div class="player-track-artist" id="playerTrackArtist">—</div>
          </div>
        </div>

        <!-- Audio element -->
        <div class="player-center" id="playerAudio" style="display:none; flex:2; display:none">
          <audio id="audioPlayer" controls preload="none" style="width:100%;max-width:520px">
            Seu navegador não suporta áudio HTML5.
          </audio>
        </div>

        <!-- Idle state -->
        <div class="player-idle" id="playerIdle" style="flex:1;text-align:center">
          🎵 Selecione uma música para ouvir
        </div>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/user.js"></script>
</body>
</html>
