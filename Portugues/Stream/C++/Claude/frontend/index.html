<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamMusic — Login</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="36" height="36" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z"/>
      </svg>
      <h1>StreamMusic</h1>
    </div>

    <h2>Bem-vindo de volta</h2>
    <p>Faça login para continuar</p>

    <div id="alertBox"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Entrar</button>
    </form>

    <div class="auth-link">
      Não tem conta? <a href="/register.html">Criar conta</a>
    </div>
  </div>

  <script src="/assets/js/api.js"></script>
  <script>
    // Redirect if already logged in
    (function() {
      const user = Api.getUser();
      const token = Api.getToken();
      if (user && token) {
        if (user.type === 'ARTISTA') window.location.href = '/artist/dashboard.html';
        else                         window.location.href = '/user/dashboard.html';
      }
    })();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Entrando...';

      try {
        const data = await Api.login(
          document.getElementById('email').value,
          document.getElementById('password').value
        );
        if (data.type === 'ARTISTA') window.location.href = '/artist/dashboard.html';
        else                          window.location.href = '/user/dashboard.html';
      } catch (err) {
        showAlert('alertBox', err.message || 'Erro ao fazer login.');
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
